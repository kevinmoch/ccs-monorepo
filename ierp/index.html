<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - CCS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px;
        width: 380px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
      .login-card h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-size: 24px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        color: #555;
        font-size: 14px;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        border-color: #667eea;
      }
      .login-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .login-btn:hover {
        opacity: 0.9;
      }
      .login-btn:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>CCS 登录</h2>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" value="admin" placeholder="请输入用户名" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" value="123456" placeholder="请输入密码" />
      </div>
      <button class="login-btn" id="loginBtn">登 录</button>
    </div>

    <script>
      document.getElementById('loginBtn').addEventListener('click', function () {
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;

        console.log('登录信息：', { username: username, password: password });

        // 获取 URL 中的 redirect 参数
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');

        if (redirect) {
          var targetUrl = redirect;

          // 仅当当前页面域名包含 huaweicloud 时，追加 tenant 参数
          if (window.location.hostname.indexOf('huaweicloud') !== -1) {
            var separator = redirect.indexOf('?') === -1 ? '?' : '&';
            targetUrl = redirect + separator + 'tenant=CCS_Tenant_Gray';
          }

          window.location.href = targetUrl;
        } else {
          alert('登录成功！未指定重定向地址。');
        }
      });
    </script>
  </body>
</html>
