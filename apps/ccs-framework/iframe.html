<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Iframe - 可响应主题</title>
    <style>
      /* 基础滚动条样式（与主框架一致） */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background-color: #475569;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background-color: #334155;
      }

      /* 默认亮色主题样式 */
      body {
        background-color: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .container {
        text-align: center;
        padding: 2rem;
      }

      /* 暗色主题样式 —— 这里产生视觉变化 */
      html.dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }

      /* 暗色主题下滚动条也适配（你已经写了，但可保留） */
      html.dark ::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.2);
      }

      html.dark ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(255, 255, 255, 0.3);
      }

      /* 可选：为演示增加一个小卡片效果 */
      .card {
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        margin-top: 20px;
        display: inline-block;
      }

      html.dark .card {
        background-color: rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>这是一个 iframe 页面</h2>
      <p>已内置与主框架一致的滚动条样式，并通过 postMessage 监听父平台的主题和语言设置变化。</p>
      <div class="card">
        当前主题：<span id="theme-indicator">亮色</span><br>
        当前语言：<span id="lang-indicator">中文</span>
      </div>
    </div>

    <script>
      // 监听父页面的状态同步消息
      window.addEventListener('message', function (event) {
        if (event.data && event.data.type === 'SYNC_STATE') {
          const { isDark, language } = event.data.payload;

          // 1. 同步暗色/亮色主题（视觉变化现在会生效，因为有对应 CSS）
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-indicator').innerText = '暗色';
          } else {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-indicator').innerText = '亮色';
          }

          // 2. 同步语言（此处简单演示，实际可对接 i18n）
          document.documentElement.lang = language;
          document.getElementById('lang-indicator').innerText = language === 'zh' ? '中文' : 'English';
          console.log(`收到同步: 暗色=${isDark}, 语言=${language}`);
        }
      });
    </script>
  </body>
</html>
